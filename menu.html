<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AvançaTech</title>
    <link rel="stylesheet" href="./css/menu.css">
</head>
<body>
    <div class="login-container">
        <!-- Lado Esquerdo: Formulário e Botões -->
        <div class="login-box">
            <h2>Acesso ao Sistema</h2>
            <div class="button-group">
                <button class="btn-animated" onclick="navegar('diario')">Diário de Aula</button>
                <button class="btn-animated" onclick="navegar('carometro')">Carômetro</button>
                <button class="btn-animated" onclick="navegar('lista')">Lista de Alunos</button>
                <button class="btn-animated" onclick="navegar('cadastro')">Cadastro de Alunos</button>
            </div>
        </div>

        <!-- Lado Direito: Imagem -->
        <div class="image-box">
            <img src="./img/avancatech.jpg" alt="Logo AvançaTech">
        </div>
    </div>

    <script src="./js/menu.js"></script>
</body>
</html>
